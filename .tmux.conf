# =============================================================================
#   Bootstrapping
# =============================================================================

# Auto-install tpm
run-shell 'if [ ! -x ~/.tmux/plugins/tpm/tpm ]; then git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm; else exit 0; fi'

# Auto-link gitmux config on first run
run-shell 'conf_dir=$(dirname "$(readlink -f ~/.tmux.conf)"); if [ ! -f ~/.gitmux.yml ]; then ln -sf "$conf_dir/.gitmux.yml" ~/.gitmux.yml; fi'

# =============================================================================
#   General options
# =============================================================================

set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*:Tc"

set -g mouse on

set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on

set -g automatic-rename on
set -g set-titles on

set -g history-limit 50000
set -g display-time 3000

set -g status-keys vi
set -g mode-keys vi

set -s escape-time 0

set -g visual-bell off

# =============================================================================
#   Key bindings
# =============================================================================

set -g prefix C-a
bind-key C-a send-prefix

# Vi-style copy mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi V send -X select-line
bind -T copy-mode-vi C-v send -X rectangle-toggle \; send -X begin-selection
bind -T copy-mode-vi H send -X start-of-line
bind -T copy-mode-vi L send -X end-of-line
bind -T copy-mode-vi o send -X other-end
bind -T copy-mode-vi Escape send -X cancel

# =============================================================================
#   Plugins
# =============================================================================

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

set -g @plugin 'wfxr/tmux-power'
set -g @plugin 'MunifTanjim/tmux-mode-indicator'
set -g @plugin "tmux-plugins/tmux-battery"

set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-pain-control'
set -g @plugin 'tmux-plugins/tmux-copycat'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-open'
set -g @plugin 'tmux-plugins/tmux-sessionist'
set -g @plugin 'tmux-plugins/tmux-logging'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'nhdaly/tmux-better-mouse-mode'
set -g @plugin 'Morantron/tmux-fingers'

# =============================================================================
#   Plugin settings
# =============================================================================

set-environment -g TMUX_FZF_LAUNCH_KEY Q

set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-processes 'ssh "git log"'

# --- tmux-power ---
set -g @tmux_power_theme 'snow'
set -g @tmux_power_right_arrow_icon ''
set -g @tmux_power_left_arrow_icon  ''

set -g @tmux_power_left_a  '#[bold]#S'
set -g @tmux_power_left_b  '#{tmux_mode_indicator}'
set -g @tmux_power_left_c  ''
set -g @tmux_power_left_d  ''

set -g @tmux_power_right_w '#(gitmux -timeout 500ms -cfg ~/.gitmux.yml "#{pane_current_path}")'
set -g @tmux_power_right_x '%H:%M'
set -g @tmux_power_right_y '%Y-%m-%d'
set -g @tmux_power_right_z '#{?#{battery_percentage},#{battery_icon} #{battery_percentage} | ,}#H'

# =============================================================================
#   Initialize tpm (keep last)
# =============================================================================

run-shell '~/.tmux/plugins/tpm/tpm'
